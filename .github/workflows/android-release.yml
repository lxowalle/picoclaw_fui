name: Build Android Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Android SDK (API 29)
        uses: r0adkll/setup-android@v2
        with:
          api-level: 29
          build-tools: '29.0.3'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache pub and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.yaml') }}-${{ hashFiles('**/gradle-wrapper.properties') }}

      - name: Flutter pub get
        run: flutter pub get

      - name: Accept Android SDK licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --release --target-platform android-arm,android-arm64

      - name: Build Android APK (debug, installable for testing)
        run: flutter build apk --debug

      - name: Collect and rename Android artifacts
        run: |
          set -e
          PKG_NAME=picoclaw_flutter_ui
          rm -f ${PKG_NAME}.aab ${PKG_NAME}.apk || true
          # Copy AAB (release) if present
          if ls build/app/outputs/bundle/release/*.aab 1> /dev/null 2>&1; then
            cp build/app/outputs/bundle/release/*.aab ${PKG_NAME}.aab
          else
            echo "AAB not found"; exit 1
          fi
          # Copy debug APK (signed with debug key) so it can be installed on devices
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk ${PKG_NAME}.apk
          else
            echo "Debug APK not found"; exit 1
          fi

      - name: Prepare release metadata
        id: vars
        run: |
          now=$(date -u +%Y%m%d-%H%M%S)
          short=$(git rev-parse --short=6 HEAD)
          tag="picoclaw_fui-$now-$short"
          echo "Computed release tag: $tag"
          echo "release_tag=$tag" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          release_name: ${{ steps.vars.outputs.release_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAB release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./picoclaw_flutter_ui.aab
          asset_name: picoclaw_flutter_ui.aab
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./picoclaw_flutter_ui.apk
          asset_name: picoclaw_flutter_ui.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
